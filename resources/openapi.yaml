openapi: 3.0.0
info:
  title: Neon Daemon Management API
  description: Management API for the Neon Daemon to manage users, organizations, projects, branches, and compute endpoints.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Default server for management API
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
    OrganizationResponse:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    CreateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    ProjectResponse:
      type: object
      required:
        - id
        - name
        - organization_id
        - pg_version
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        organization_id:
          type: string
          format: uuid
        pg_version:
          $ref: '#/components/schemas/PgVersion'
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        pg_version:
          $ref: '#/components/schemas/PgVersion'
    BranchResponse:
      type: object
      required:
        - id
        - project_id
        - name
        - slug
        - timeline_id
        - endpoint_status
        - remote_consistent_lsn_visible
        - last_record_lsn
        - current_logical_size
        - password
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        parent_branch_id:
          type: string
          format: uuid
          nullable: true
        timeline_id:
          type: string
          format: uuid
        endpoint_status:
          $ref: '#/components/schemas/ComputeEndpointStatus'
        remote_consistent_lsn_visible:
          type: string
        last_record_lsn:
          type: string
        current_logical_size:
          type: integer
          format: int64
        connection_string:
          type: string
          nullable: true
        password:
          type: string
    CreateBranchRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
    UpdateOrganizationRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    UpdateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    UpdateBranchRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    EndpointResponse:
      type: object
      required:
        - branch_id
        - status
        - port
        - password
      properties:
        branch_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/ComputeEndpointStatus'
        port:
          type: integer
          format: int32
        sni_hostname:
          type: string
          nullable: true
        password:
          type: string
    ComputeEndpointStatus:
      type: string
      enum:
        - starting
        - running
        - stopping
        - stopped
        - failed
    PgVersion:
      type: string
      enum:
        - v14
        - v15
        - v16
        - v17
    ErrorResponse:
      type: string
      description: Error message string
paths:
  /auth/login:
    post:
      summary: Login
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register:
    post:
      summary: Register
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Successful registration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Conflict (user already exists)
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations:
    get:
      summary: List organizations
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create organization
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations/{org_id}:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get organization details
      operationId: getOrganization
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update organization details
      operationId: updateOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete organization
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Organization deleted
        '401':
          description: Unauthorized
        '404':
          description: Organization not found
        '500':
          description: Internal server error
  /organizations/{org_id}/members:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List organization members
      operationId: listOrganizationMembers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of members (user IDs)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  format: uuid
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations/{org_id}/members/{user_id}:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: Assign member to organization
      operationId: assignMember
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Member assigned
        '401':
          description: Unauthorized
        '404':
          description: Organization not found
        '409':
          description: User is already a member
        '500':
          description: Internal server error
    delete:
      summary: Revoke member from organization
      operationId: revokeMember
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Member revoked
        '401':
          description: Unauthorized
        '404':
          description: Member or Organization not found
        '500':
          description: Internal server error
  /organizations/{org_id}/projects:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List projects in an organization
      operationId: listProjects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create project in an organization
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organization not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations/{org_id}/projects/{project_id}:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get project details
      operationId: getProject
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update project details
      operationId: updateProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete project
      operationId: deleteProject
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Project deleted
        '401':
          description: Unauthorized
        '404':
          description: Project not found
        '500':
          description: Internal server error
  /organizations/{org_id}/projects/{project_id}/branches:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: List branches in a project
      operationId: listBranches
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of branches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BranchResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create branch in a project
      operationId: createBranch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBranchRequest'
      responses:
        '201':
          description: Branch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Project not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /organizations/{org_id}/projects/{project_id}/branches/{branch_id}:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: branch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: Update branch details
      operationId: updateBranch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBranchRequest'
      responses:
        '200':
          description: Branch updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Branch not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete branch
      operationId: deleteBranch
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Branch deleted
        '401':
          description: Unauthorized
        '404':
          description: Branch not found
        '500':
          description: Internal server error
  /organizations/{org_id}/projects/{project_id}/branches/{branch_id}/endpoint:
    parameters:
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: branch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get endpoint status for a branch
      operationId: getEndpointStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Endpoint status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Branch not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Start compute endpoint for a branch
      operationId: startEndpoint
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Endpoint started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Branch not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Stop compute endpoint for a branch
      operationId: stopEndpoint
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Endpoint stopped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EndpointResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Branch not found
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
