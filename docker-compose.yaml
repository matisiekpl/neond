services:
  neond:
    image: neond/neond
    environment:
      PORT: 3000
      SERVER_SECRET: "1234"
      PG_PROXY_PORT: "5433"
      PORT_RANGE: 50000-50010
    ports:
      - "3000:3000"
      - "5433:5433"
      - "50000-50010:50000-50010"
    restart: unless-stopped
    stop_grace_period: 1h
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/auth/setup"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5m
    volumes:
      - ./neond_data:/neond
